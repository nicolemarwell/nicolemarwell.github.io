<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Signal measurements across a mapped grid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B2A4A"/>
      <stop offset="1" stop-color="#7C8B8F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- faint map grid -->
  <g stroke="#FAF5F0" stroke-opacity="0.08" stroke-width="2">
    <path d="M133 0V1000M266 0V1000M400 0V1000M533 0V1000M666 0V1000"/>
    <path d="M0 140H800M0 280H800M0 420H800M0 560H800M0 700H800"/>
  </g>
  <!-- signal source A -->
  <g fill="none" stroke="#E0996B" stroke-width="2.5">
    <circle cx="250" cy="290" r="34" stroke-opacity="0.85"/>
    <circle cx="250" cy="290" r="66" stroke-opacity="0.5"/>
    <circle cx="250" cy="290" r="100" stroke-opacity="0.28"/>
    <circle cx="250" cy="290" r="136" stroke-opacity="0.14"/>
  </g>
  <circle cx="250" cy="290" r="9" fill="#E0996B"/>
  <!-- signal source B -->
  <g fill="none" stroke="#FAF5F0" stroke-width="2.5">
    <circle cx="560" cy="470" r="28" stroke-opacity="0.7"/>
    <circle cx="560" cy="470" r="56" stroke-opacity="0.4"/>
    <circle cx="560" cy="470" r="88" stroke-opacity="0.22"/>
  </g>
  <circle cx="560" cy="470" r="8" fill="#FAF5F0"/>
  <!-- scattered measurement points -->
  <g fill="#FAF5F0" fill-opacity="0.55">
    <circle cx="140" cy="180" r="4"/><circle cx="410" cy="150" r="4"/>
    <circle cx="650" cy="230" r="4"/><circle cx="330" cy="360" r="4"/>
    <circle cx="470" cy="300" r="4"/><circle cx="180" cy="470" r="4"/>
    <circle cx="700" cy="420" r="4"/><circle cx="390" cy="540" r="4"/>
    <circle cx="600" cy="600" r="4"/><circle cx="250" cy="600" r="4"/>
  </g>
</svg>
