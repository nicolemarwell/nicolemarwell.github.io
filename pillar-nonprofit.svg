<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Network of organizations across a city">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A3D56"/>
      <stop offset="1" stop-color="#B5652F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- faint city-block grid -->
  <g stroke="#FAF5F0" stroke-opacity="0.07" stroke-width="2">
    <path d="M100 0V1000M200 0V1000M300 0V1000M400 0V1000M500 0V1000M600 0V1000M700 0V1000"/>
    <path d="M0 150H800M0 300H800M0 450H800M0 600H800M0 750H800M0 900H800"/>
  </g>
  <!-- network edges -->
  <g stroke="#FAF5F0" stroke-opacity="0.30" stroke-width="2.5" fill="none">
    <line x1="180" y1="220" x2="360" y2="150"/>
    <line x1="360" y1="150" x2="520" y2="260"/>
    <line x1="180" y1="220" x2="280" y2="360"/>
    <line x1="280" y1="360" x2="460" y2="420"/>
    <line x1="520" y1="260" x2="460" y2="420"/>
    <line x1="460" y1="420" x2="620" y2="400"/>
    <line x1="280" y1="360" x2="150" y2="470"/>
    <line x1="460" y1="420" x2="380" y2="560"/>
    <line x1="520" y1="260" x2="620" y2="400"/>
  </g>
  <!-- nodes -->
  <g>
    <circle cx="180" cy="220" r="15" fill="#E0996B"/>
    <circle cx="360" cy="150" r="10" fill="#FAF5F0" fill-opacity="0.92"/>
    <circle cx="520" cy="260" r="12" fill="#FAF5F0" fill-opacity="0.85"/>
    <circle cx="280" cy="360" r="9"  fill="#FAF5F0" fill-opacity="0.85"/>
    <circle cx="460" cy="420" r="18" fill="#E0996B"/>
    <circle cx="620" cy="400" r="10" fill="#FAF5F0" fill-opacity="0.85"/>
    <circle cx="150" cy="470" r="8"  fill="#FAF5F0" fill-opacity="0.8"/>
    <circle cx="380" cy="560" r="11" fill="#FAF5F0" fill-opacity="0.85"/>
  </g>
</svg>
